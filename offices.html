<title>ORN Worldwide Offices</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#0c1e35;--navy2:#163352;--navy3:#071526;
  --cyan:#0891b2;--cyan2:#0e7490;--cyan-light:#e0f2fe;
  --magenta:#d4145a;--magenta2:#a8104a;
  --gold:#b45309;--gold-light:#fef3c7;
  --green:#047857;--green-light:#d1fae5;
  --orange:#c2410c;--orange-light:#ffedd5;
  --purple:#6d28d9;--purple-light:#ede9fe;
  --slate:#475569;--slate2:#94a3b8;--slate3:#cbd5e1;
  --border:#e2e8f0;--bg:#f8fafc;--card:#ffffff;
  --ink:#0f172a;--ink2:#1e293b;--ink3:#334155;
  --r:8px;--r-lg:14px;
  --sh:0 1px 3px rgba(0,0,0,0.05),0 4px 12px rgba(0,0,0,0.07);
  --sh-md:0 4px 20px rgba(0,0,0,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);}

/* ── TOPBAR ─────────────────────────────────────────────────── */
.topbar{
  height:54px;background:var(--navy);display:flex;align-items:center;
  padding:0 24px;gap:16px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,0.3);
}
.topbar-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--cyan),var(--magenta));border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-size:1rem;color:white;font-style:italic;flex-shrink:0;}
.topbar-name{font-size:0.9rem;font-weight:800;color:white;letter-spacing:-0.2px;}
.topbar-name span{color:rgba(255,255,255,0.4);font-weight:400;}
.topbar-sep{width:1px;height:24px;background:rgba(255,255,255,0.1);}
.back-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:rgba(255,255,255,0.7);font-size:0.75rem;font-weight:600;text-decoration:none;transition:all 0.18s;font-family:'Plus Jakarta Sans',sans-serif;}
.back-btn:hover{background:rgba(255,255,255,0.12);color:white;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.topbar-stat{text-align:right;}
.topbar-stat-n{font-size:1rem;font-weight:800;color:var(--cyan);}
.topbar-stat-l{font-size:0.62rem;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.06em;}

/* ── HERO ───────────────────────────────────────────────────── */
.hero{
  background:linear-gradient(135deg,var(--navy3) 0%,var(--navy) 60%,#1a1040 100%);
  padding:36px 32px 30px;position:relative;overflow:hidden;
}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 80% at 80% 50%,rgba(8,145,178,0.1) 0%,transparent 65%);}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(8,145,178,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(8,145,178,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;}
.hero-content{position:relative;max-width:1200px;margin:0 auto;}
.hero-label{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--cyan);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.hero-title{font-family:'Instrument Serif',serif;font-size:2.2rem;color:white;margin-bottom:6px;font-style:italic;line-height:1.2;}
.hero-title span{color:var(--cyan);}
.hero-sub{font-size:0.84rem;color:rgba(255,255,255,0.5);max-width:560px;line-height:1.65;margin-bottom:20px;}
.hero-stats{display:flex;gap:24px;flex-wrap:wrap;}
.hstat{text-align:center;padding:10px 18px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;}
.hstat-n{font-size:1.6rem;font-weight:800;color:white;}
.hstat-l{font-size:0.64rem;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.07em;margin-top:1px;}

/* ── TOOLBAR ────────────────────────────────────────────────── */
.toolbar{
  background:white;border-bottom:1.5px solid var(--border);
  padding:14px 32px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  position:sticky;top:54px;z-index:90;
}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:340px;}
.search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--slate2);font-size:0.75rem;pointer-events:none;}
.search-inp{width:100%;padding:8px 12px 8px 32px;border:1.5px solid var(--border);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.82rem;outline:none;transition:border-color 0.18s;color:var(--ink);}
.search-inp:focus{border-color:var(--cyan);}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:5px 12px;border:1.5px solid var(--border);border-radius:20px;font-size:0.72rem;font-weight:600;color:var(--slate);cursor:pointer;transition:all 0.15s;background:white;font-family:'Plus Jakarta Sans',sans-serif;white-space:nowrap;}
.chip:hover,.chip.on{background:var(--navy);border-color:var(--navy);color:white;}
.chip.active-only.on{background:var(--green);border-color:var(--green);}
.view-btns{display:flex;gap:4px;margin-left:auto;}
.view-btn{width:32px;height:32px;border:1.5px solid var(--border);border-radius:7px;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:var(--slate);transition:all 0.15s;}
.view-btn.on{background:var(--navy);border-color:var(--navy);color:white;}
.results-bar{padding:8px 32px;font-size:0.74rem;color:var(--slate2);background:var(--bg);border-bottom:1px solid var(--border);}

/* ── MAIN ───────────────────────────────────────────────────── */
.main{max-width:1400px;margin:0 auto;padding:28px 32px;}

/* ── REGION SECTION ─────────────────────────────────────────── */
.region-section{margin-bottom:36px;}
.region-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.region-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;color:white;flex-shrink:0;}
.region-name{font-size:0.75rem;font-weight:800;text-transform:uppercase;letter-spacing:0.09em;color:var(--slate);flex:1;}
.region-count{font-size:0.68rem;color:var(--slate2);font-weight:600;}
.region-line{flex:1;height:1px;background:var(--border);}

/* ── OFFICE CARDS ───────────────────────────────────────────── */
.offices-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;}
.offices-list{display:flex;flex-direction:column;gap:8px;}

.office-card{
  background:white;border:1.5px solid var(--border);border-radius:var(--r-lg);
  overflow:hidden;transition:all 0.2s;box-shadow:var(--sh);
  display:flex;flex-direction:column;
}
.office-card:hover{transform:translateY(-2px);box-shadow:var(--sh-md);}
.office-card.non-op{opacity:0.72;}
.office-card.non-op:hover{opacity:1;}

.oc-top{padding:16px 18px 12px;position:relative;}
.oc-top-row{display:flex;align-items:flex-start;gap:12px;}
.oc-flag{font-size:2rem;line-height:1;flex-shrink:0;}
.oc-info{flex:1;min-width:0;}
.oc-country{font-size:1rem;font-weight:800;color:var(--ink);line-height:1.2;}
.oc-city{font-size:0.74rem;color:var(--slate2);margin-top:1px;}
.oc-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}

.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:5px;font-size:0.63rem;font-weight:700;}
.badge-active{background:#d1fae5;color:#065f46;}
.badge-nonop{background:#f1f5f9;color:#64748b;}
.badge-tier1{background:#dbeafe;color:#1e40af;}
.badge-tier2{background:#e0f2fe;color:#0e7490;}
.badge-tier3{background:#f0fdf4;color:#166534;}
.badge-tier4{background:#f8fafc;color:#94a3b8;}
.badge-type{background:#faf5ff;color:#6d28d9;}

.oc-divider{height:1px;background:var(--border);margin:0 18px;}

.oc-body{padding:12px 18px;flex:1;display:flex;flex-direction:column;gap:6px;}
.oc-row{display:flex;align-items:flex-start;gap:8px;font-size:0.74rem;color:var(--ink3);}
.oc-row i{color:var(--slate2);font-size:0.65rem;margin-top:2px;width:12px;flex-shrink:0;}
.oc-row a{color:var(--cyan);text-decoration:none;}
.oc-row a:hover{text-decoration:underline;}

.oc-purpose{background:var(--bg);border-left:2.5px solid var(--cyan);border-radius:0 6px 6px 0;padding:7px 10px;font-size:0.72rem;color:var(--slate);line-height:1.5;margin-top:4px;}

.oc-capabilities{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.cap-badge{font-size:0.62rem;font-weight:700;padding:2px 7px;border-radius:4px;}
.cap-in{background:#dbeafe;color:#1e40af;}
.cap-out{background:#d1fae5;color:#065f46;}
.cap-transport{background:#fef3c7;color:#92400e;}
.cap-physical{background:#faf5ff;color:#6d28d9;}
.cap-credits{background:#fff7ed;color:#c2410c;}

/* ── LIST VIEW ──────────────────────────────────────────────── */
.office-row{
  background:white;border:1px solid var(--border);border-radius:10px;
  padding:12px 18px;display:flex;align-items:center;gap:14px;
  transition:all 0.15s;box-shadow:var(--sh);
}
.office-row:hover{border-color:var(--cyan);box-shadow:var(--sh-md);}
.or-flag{font-size:1.4rem;flex-shrink:0;}
.or-main{flex:1;min-width:0;}
.or-name{font-size:0.88rem;font-weight:700;color:var(--ink);}
.or-city{font-size:0.72rem;color:var(--slate2);}
.or-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px;}
.or-contacts{flex:0 0 220px;font-size:0.72rem;color:var(--slate);line-height:1.4;}
.or-stats{display:flex;gap:14px;flex-shrink:0;}
.or-stat{text-align:center;}
.or-stat-n{font-size:0.85rem;font-weight:700;color:var(--ink);}
.or-stat-l{font-size:0.6rem;color:var(--slate2);text-transform:uppercase;letter-spacing:0.05em;}

/* ── MAP PLACEHOLDER / WORLD VIZ ─────────────────────────────── */
.world-banner{
  background:var(--navy);border-radius:var(--r-lg);padding:20px 28px;
  margin-bottom:24px;display:flex;align-items:center;gap:20px;
  position:relative;overflow:hidden;
}
.world-banner::before{content:'';position:absolute;right:-60px;top:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(8,145,178,0.15),transparent 70%);}
.wb-dots{font-size:2rem;flex-shrink:0;}
.wb-text{flex:1;}
.wb-title{font-size:1rem;font-weight:800;color:white;margin-bottom:2px;}
.wb-sub{font-size:0.75rem;color:rgba(255,255,255,0.45);line-height:1.5;}
.wb-stats{display:flex;gap:16px;flex-shrink:0;}
.wb-stat{text-align:center;padding:8px 14px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:9px;}
.wb-stat-n{font-size:1.1rem;font-weight:800;color:var(--cyan);}
.wb-stat-l{font-size:0.6rem;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.06em;}

/* ── EMPTY ──────────────────────────────────────────────────── */
.empty{padding:60px;text-align:center;color:var(--slate2);}
.empty i{font-size:2rem;display:block;margin-bottom:10px;opacity:0.4;}

@media(max-width:768px){
  .hero{padding:24px 20px 20px;}
  .toolbar{padding:12px 16px;}
  .main{padding:20px 16px;}
  .hero-stats{gap:12px;}
  .hstat{padding:8px 12px;}
  .hero-title{font-size:1.6rem;}
  .or-contacts,.or-stats{display:none;}
}
</style>
</head>

// ── CONFIG ────────────────────────────────────────────────────
const REGION_CONFIG = {
  'Europe':       { icon:'fa-landmark',     color:'#1d4ed8' },
  'Middle East':  { icon:'fa-mosque',       color:'#b45309' },
  'South Asia':   { icon:'fa-building',     color:'#d4145a' },
  'Asia Pacific': { icon:'fa-torii-gate',   color:'#059669' },
  'Americas':     { icon:'fa-globe-americas',color:'#7c3aed' },
  'Oceania':      { icon:'fa-water',        color:'#0891b2' },
};
const TIER_LABELS = {1:'Strategic HQ',2:'Active Market',3:'Emerging',4:'Pipeline'};
const TIER_CLASSES = {1:'badge-tier1',2:'badge-tier2',3:'badge-tier3',4:'badge-tier4'};

// ── STATE ──────────────────────────────────────────────────────
let activeRegion = 'All';
let activeOnly   = false;
let viewMode     = 'grid';

// ── INIT ───────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  buildTopStats();
  buildHeroStats();
  buildRegionChips();
  render();
});

function buildTopStats(){
  const active = OFFICES.filter(o => o.status === 'Active').length;
  const staff  = OFFICES.reduce((sum,o) => sum + (parseInt(o.staff)||0), 0);
  document.getElementById('topActive').textContent = active;
  document.getElementById('topStaff').textContent  = staff.toLocaleString();
}

function buildHeroStats(){
  const regions = [...new Set(OFFICES.map(o=>o.region))].length;
  const active  = OFFICES.filter(o=>o.status==='Active').length;
  const staff   = OFFICES.reduce((s,o)=>s+(parseInt(o.staff)||0),0);
  const drivers = OFFICES.reduce((s,o)=>s+(parseInt(o.drivers)||0),0);
  document.getElementById('heroStats').innerHTML = [
    {n:OFFICES.length, l:'Total Offices'},
    {n:active,         l:'Active'},
    {n:regions,        l:'Regions'},
    {n:staff.toLocaleString(), l:'Total Staff'},
    {n:drivers||'14',  l:'Fleet Drivers'},
  ].map(s=>`<div class="hstat"><div class="hstat-n">${s.n}</div><div class="hstat-l">${s.l}</div></div>`).join('');
}

function buildRegionChips(){
  const regions = ['All', ...Object.keys(REGION_CONFIG)];
  document.getElementById('regionChips').innerHTML = regions.map(r =>
    `<div class="chip ${r==='All'?'on':''}" onclick="setRegion('${r}',this)">${r==='All'?'All Regions':r}</div>`
  ).join('');
}

// ── FILTERS ───────────────────────────────────────────────────
function setRegion(r, el){
  activeRegion = r;
  document.querySelectorAll('#regionChips .chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  render();
}
function toggleActive(el){
  activeOnly = !activeOnly;
  el.classList.toggle('on', activeOnly);
  render();
}
function applyFilters(){ render(); }
function setView(v, btn){
  viewMode = v;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function filtered(){
  const q = document.getElementById('searchInp').value.toLowerCase().trim();
  return OFFICES.filter(o => {
    if(activeOnly && o.status !== 'Active') return false;
    if(activeRegion !== 'All' && o.region !== activeRegion) return false;
    if(q){
      const hay = [o.country,o.city,o.region,o.contacts,o.address,o.purpose,o.market].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  const data = filtered();
  document.getElementById('resultsBar').textContent =
    `Showing ${data.length} of ${OFFICES.length} offices`;

  if(!data.length){
    document.getElementById('mainArea').innerHTML =
      `<div class="empty"><i class="fas fa-search"></i>No offices match your filters.</div>`;
    return;
  }

  if(viewMode === 'list'){
    renderList(data);
  } else {
    renderGrid(data);
  }
}

function renderGrid(data){
  // Group by region
  const groups = {};
  data.forEach(o => {
    if(!groups[o.region]) groups[o.region] = [];
    groups[o.region].push(o);
  });

  const html = Object.entries(groups).map(([region, offices]) => {
    const cfg = REGION_CONFIG[region] || {icon:'fa-globe',color:'#475569'};
    return `
      <div class="region-section">
        <div class="region-header">
          <div class="region-icon" style="background:${cfg.color};"><i class="fas ${cfg.icon}"></i></div>
          <div class="region-name">${region}</div>
          <div class="region-line"></div>
          <div class="region-count">${offices.length} office${offices.length>1?'s':''}</div>
        </div>
        <div class="offices-grid">
          ${offices.map(o => officeCard(o)).join('')}
        </div>
      </div>`;
  }).join('');

  document.getElementById('mainArea').innerHTML = html;
}

function renderList(data){
  const html = `<div class="offices-list">${data.map(o => officeRow(o)).join('')}</div>`;
  document.getElementById('mainArea').innerHTML = html;
}

function capBadges(o){
  const caps = [];
  if(o.physical==='Yes')  caps.push(`<span class="cap-badge cap-physical">📍 Physical</span>`);
  if(o.inbound==='Yes')   caps.push(`<span class="cap-badge cap-in">↙ Inbound</span>`);
  if(o.outbound==='Yes')  caps.push(`<span class="cap-badge cap-out">↗ Outbound</span>`);
  if(o.transport==='Yes') caps.push(`<span class="cap-badge cap-transport">🚌 Transport</span>`);
  if(o.credits==='Yes')   caps.push(`<span class="cap-badge cap-credits">💳 Credits</span>`);
  return caps.join('');
}

function officeCard(o){
  const tc  = TIER_CLASSES[o.tier] || 'badge-tier4';
  const tl  = TIER_LABELS[o.tier]  || 'Tier '+o.tier;
  const isActive = o.status === 'Active';
  const staff = parseInt(o.staff)||0;
  const drivers = parseInt(o.drivers)||0;

  return `
    <div class="office-card ${isActive?'':'non-op'}">
      <div class="oc-top">
        <div class="oc-top-row">
          <div class="oc-flag">${o.flag||'🏢'}</div>
          <div class="oc-info">
            <div class="oc-country">${o.country}</div>
            <div class="oc-city">${o.city||o.region}${o.market&&o.market!==o.region?' · '+o.market:''}</div>
            <div class="oc-badges">
              <span class="badge ${isActive?'badge-active':'badge-nonop'}">${o.status}</span>
              <span class="badge ${tc}">${tl}</span>
              ${o.type?`<span class="badge badge-type">${o.type}</span>`:''}
            </div>
          </div>
        </div>
      </div>
      <div class="oc-divider"></div>
      <div class="oc-body">
        ${o.contacts ? `<div class="oc-row"><i class="fas fa-user-tie"></i><span>${o.contacts}</span></div>` : ''}
        ${o.address  ? `<div class="oc-row"><i class="fas fa-map-marker-alt"></i><span>${o.address}</span></div>` : ''}
        ${staff > 0  ? `<div class="oc-row"><i class="fas fa-users"></i><span>${staff} staff${drivers>0?' · '+drivers+' fleet drivers':''}</span></div>` : ''}
        ${o.purpose  ? `<div class="oc-purpose">${o.purpose}</div>` : ''}
        <div class="oc-capabilities">${capBadges(o)}</div>
      </div>
    </div>`;
}

function officeRow(o){
  const tc = TIER_CLASSES[o.tier] || 'badge-tier4';
  const tl = TIER_LABELS[o.tier]  || 'Tier '+o.tier;
  const isActive = o.status === 'Active';
  const staff = parseInt(o.staff)||0;

  return `
    <div class="office-row">
      <div class="or-flag">${o.flag||'🏢'}</div>
      <div class="or-main">
        <div class="or-name">${o.country}</div>
        <div class="or-city">${o.city||''}${o.region?' · '+o.region:''}</div>
        <div class="or-badges">
          <span class="badge ${isActive?'badge-active':'badge-nonop'}">${o.status}</span>
          <span class="badge ${tc}">${tl}</span>
          ${o.type?`<span class="badge badge-type">${o.type}</span>`:''}
          <span style="font-size:0.63rem;color:var(--slate2);">${capBadges(o)}</span>
        </div>
      </div>
      <div class="or-contacts">${o.contacts||'<span style="color:var(--slate2);">Contact TBC</span>'}${o.purpose?'<div style="margin-top:3px;color:var(--slate2);font-size:0.68rem;">'+o.purpose.slice(0,80)+'…</div>':''}</div>
      <div class="or-stats">
        <div class="or-stat"><div class="or-stat-n">${staff||'—'}</div><div class="or-stat-l">Staff</div></div>
        <div class="or-stat"><div class="or-stat-n">${o.drivers||'—'}</div><div class="or-stat-l">Drivers</div></div>
      </div>
    </div>`;
}
</script>
