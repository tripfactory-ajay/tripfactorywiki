<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORN Worldwide Offices</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root{
  --navy:#0c1e35;--navy2:#163352;--navy3:#071526;
  --magenta:#d4145a;--magenta2:#a8104a;--magenta-light:#fce7f0;
  --cyan:#0891b2;--cyan2:#0e7490;--cyan-light:#e0f2fe;
  --gold:#b45309;--gold-light:#fef3c7;
  --green:#047857;--green-light:#d1fae5;
  --purple:#6d28d9;--purple-light:#ede9fe;
  --orange:#c2410c;--orange-light:#ffedd5;
  --slate:#475569;--slate2:#94a3b8;--slate3:#cbd5e1;
  --border:#e2e8f0;--border2:#f1f5f9;
  --bg:#f8fafc;--card:#ffffff;
  --ink:#0f172a;--ink2:#1e293b;--ink3:#334155;
  --r:8px;--r-lg:14px;
  --sh:0 1px 2px rgba(0,0,0,0.04),0 2px 8px rgba(0,0,0,0.06);
  --sh-md:0 4px 16px rgba(0,0,0,0.08);
  --sh-lg:0 8px 32px rgba(0,0,0,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);}

/* ── TOPBAR ── */
.topbar{height:56px;background:var(--navy);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;position:relative;z-index:300;box-shadow:0 1px 0 rgba(255,255,255,0.05),0 2px 8px rgba(0,0,0,0.3);}
.topbar-brand{display:flex;align-items:center;gap:9px;}
.topbar-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--cyan),var(--magenta));border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-size:1rem;color:white;font-style:italic;flex-shrink:0;}
.topbar-name{font-size:0.92rem;font-weight:800;color:white;letter-spacing:-0.2px;}
.topbar-name span{color:rgba(255,255,255,0.4);font-weight:400;}
.topbar-logos{display:flex;align-items:center;gap:12px;}
.topbar-logo-img{height:22px;width:auto;opacity:0.75;filter:brightness(1.2);}
.topbar-sep{width:1px;height:26px;background:rgba(255,255,255,0.08);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.topbar-user{display:flex;align-items:center;gap:7px;padding:5px 11px;background:rgba(255,255,255,0.06);border-radius:20px;border:1px solid rgba(255,255,255,0.08);}
.topbar-user-dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);flex-shrink:0;}
.topbar-user-name{font-size:0.78rem;color:rgba(255,255,255,0.8);font-weight:500;}
.topbar-time{font-size:0.75rem;color:rgba(255,255,255,0.35);font-variant-numeric:tabular-nums;}
.topbar-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border-radius:7px;padding:5px 11px;font-size:0.72rem;cursor:pointer;transition:all 0.18s;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;}
.topbar-btn:hover{background:rgba(212,20,90,0.2);border-color:var(--magenta);color:white;}

/* ── TAB NAV ── */
.tab-nav{background:white;border-bottom:1.5px solid var(--border);display:flex;padding:0 16px;overflow-x:auto;flex-shrink:0;z-index:200;position:relative;}
.tab-nav::-webkit-scrollbar{height:0;}
.tab-btn{height:44px;padding:0 16px;border:none;background:transparent;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.79rem;font-weight:600;color:var(--slate);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.18s;white-space:nowrap;display:flex;align-items:center;gap:6px;flex-shrink:0;margin-bottom:-1.5px;text-decoration:none;}
.tab-btn i{font-size:0.74rem;}
.tab-btn:hover{color:var(--ink);background:var(--bg);}
.tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan);}

/* ── OFFICES FILTER BAR ── */
.offices-filter-bar{background:var(--navy);border-bottom:1.5px solid rgba(255,255,255,0.07);padding:0 20px;display:flex;align-items:center;gap:0;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.offices-filter-bar::-webkit-scrollbar{height:0;}
.offices-stats-row{display:flex;align-items:center;gap:6px;padding:10px 0;margin-right:16px;flex-shrink:0;}
.ostat{display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:8px;border:1px solid transparent;}
.ostat-cyan{background:rgba(8,145,178,0.12);border-color:rgba(8,145,178,0.25);}
.ostat-green{background:rgba(4,120,87,0.12);border-color:rgba(4,120,87,0.2);}
.ostat-pink{background:rgba(212,20,90,0.1);border-color:rgba(212,20,90,0.2);}
.ostat i{font-size:0.72rem;}
.ostat-cyan i{color:var(--cyan);}
.ostat-green i{color:#34d399;}
.ostat-pink i{color:#f472b6;}
.ostat span:not(.ostat-l){font-size:0.8rem;font-weight:800;color:white;}
.ostat-l{font-size:0.68rem;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.06em;}
.vsep{width:1px;height:32px;background:rgba(255,255,255,0.08);margin:0 14px;flex-shrink:0;}
.region-chips{display:flex;align-items:center;gap:4px;padding:10px 0;flex-shrink:0;}
.chip{padding:5px 12px;border:1.5px solid var(--border);border-radius:20px;font-size:0.72rem;font-weight:600;color:var(--slate);cursor:pointer;transition:all 0.15s;background:white;font-family:'Plus Jakarta Sans',sans-serif;white-space:nowrap;}
.chip:hover,.chip.on{background:var(--navy);border-color:var(--navy);color:white;}
.active-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;cursor:pointer;transition:all 0.15s;white-space:nowrap;flex-shrink:0;font-size:0.73rem;color:rgba(255,255,255,0.5);font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;}
.active-chip.on{background:rgba(4,120,87,0.2);border-color:rgba(52,211,153,0.4);color:#34d399;}
.search-inp{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:7px 12px 7px 30px;color:white;font-size:0.78rem;font-family:'Plus Jakarta Sans',sans-serif;outline:none;width:190px;transition:all 0.18s;}
.search-inp:focus{border-color:#0891b2;background:rgba(8,145,178,0.1);}
.btn-add-office{display:flex;align-items:center;gap:6px;padding:6px 13px;background:rgba(8,145,178,0.15);border:1px solid rgba(8,145,178,0.3);border-radius:8px;color:var(--cyan);font-size:0.73rem;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;white-space:nowrap;margin-left:8px;transition:all 0.15s;}
.btn-add-office:hover{background:rgba(8,145,178,0.25);}
.view-btn{width:30px;height:30px;border:1px solid rgba(255,255,255,0.1);border-radius:7px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.72rem;color:rgba(255,255,255,0.4);transition:all 0.15s;}
.view-btn.view-btn-on{background:rgba(8,145,178,0.2);border-color:rgba(255,255,255,0.15);color:var(--cyan);}

/* ── MAIN ── */
.main{max-width:1400px;margin:0 auto;padding:28px 32px;}

/* ── REGION SECTION ── */
.region-section{margin-bottom:36px;}
.region-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.region-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;color:white;flex-shrink:0;}
.region-name{font-size:0.75rem;font-weight:800;text-transform:uppercase;letter-spacing:0.09em;color:var(--slate);flex:1;}
.region-count{font-size:0.68rem;color:var(--slate2);font-weight:600;}
.region-line{flex:1;height:1px;background:var(--border);}

/* ── OFFICE CARDS ── */
.offices-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;}
.offices-list{display:flex;flex-direction:column;gap:8px;}

.office-card{background:white;border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:all 0.2s;box-shadow:var(--sh);display:flex;flex-direction:column;}
.office-card:hover{transform:translateY(-2px);box-shadow:var(--sh-md);}
.office-card.non-op{opacity:0.72;}
.office-card.non-op:hover{opacity:1;}

/* Status colour bar on top of card */
.oc-status-bar{height:3px;width:100%;}
.oc-status-bar.bar-active{background:linear-gradient(90deg,#059669,#10b981);}
.oc-status-bar.bar-planning{background:linear-gradient(90deg,#b45309,#f59e0b);}
.oc-status-bar.bar-nonop{background:linear-gradient(90deg,#dc2626,#ef4444);}
.oc-status-bar.bar-opportunity{background:linear-gradient(90deg,#6d28d9,#8b5cf6);}

.oc-top{padding:16px 18px 12px;position:relative;}
.oc-top-row{display:flex;align-items:flex-start;gap:12px;}
.oc-flag{font-size:2rem;line-height:1;flex-shrink:0;}
.oc-info{flex:1;min-width:0;}
.oc-country{font-size:1rem;font-weight:800;color:var(--ink);line-height:1.2;}
.oc-city{font-size:0.74rem;color:var(--slate2);margin-top:1px;}
.oc-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}

.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:5px;font-size:0.63rem;font-weight:700;}
.badge-active{background:#d1fae5;color:#065f46;}
.badge-nonop{background:#f1f5f9;color:#64748b;}
.badge-planning{background:#fef3c7;color:#92400e;}
.badge-opportunity{background:#ede9fe;color:#5b21b6;}
.badge-tier1{background:#dbeafe;color:#1e40af;}
.badge-tier2{background:#e0f2fe;color:#0e7490;}
.badge-tier3{background:#f0fdf4;color:#166534;}
.badge-tier4{background:#f8fafc;color:#94a3b8;}
.badge-type{background:#faf5ff;color:#6d28d9;}

.oc-divider{height:1px;background:var(--border);margin:0 18px;}

.oc-body{padding:12px 18px;flex:1;display:flex;flex-direction:column;gap:6px;}
.oc-row{display:flex;align-items:flex-start;gap:8px;font-size:0.74rem;color:var(--ink3);}
.oc-row i{color:var(--slate2);font-size:0.65rem;margin-top:2px;width:12px;flex-shrink:0;}
.oc-row a{color:var(--cyan);text-decoration:none;}
.oc-row a:hover{text-decoration:underline;}
.oc-purpose{background:var(--bg);border-left:2.5px solid var(--cyan);border-radius:0 6px 6px 0;padding:7px 10px;font-size:0.72rem;color:var(--slate);line-height:1.5;margin-top:4px;}
.oc-capabilities{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.cap-badge{font-size:0.62rem;font-weight:700;padding:2px 7px;border-radius:4px;}
.cap-in{background:#dbeafe;color:#1e40af;}
.cap-out{background:#d1fae5;color:#065f46;}
.cap-transport{background:#fef3c7;color:#92400e;}
.cap-physical{background:#faf5ff;color:#6d28d9;}
.cap-credits{background:#fff7ed;color:#c2410c;}

/* Card footer buttons */
.oc-footer{display:flex;gap:6px;padding:10px 18px 12px;border-top:1px solid var(--border);}
.card-view-btn{flex:1;padding:5px;border:1px solid #bae6fd;border-radius:6px;background:#e0f2fe;font-size:0.7rem;color:#0369a1;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;transition:all 0.15s;}
.card-view-btn:hover{background:#bae6fd;}
.card-edit-btn{flex:1;padding:5px;border:1px solid var(--border);border-radius:6px;background:white;font-size:0.7rem;color:var(--slate);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all 0.15s;}
.card-edit-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.card-del-btn{padding:5px 10px;border:1px solid #fecaca;border-radius:6px;background:white;font-size:0.7rem;color:#dc2626;cursor:pointer;transition:all 0.15s;}
.card-del-btn:hover{background:#fef2f2;}

/* ── LIST VIEW ── */
.office-row{background:white;border:1px solid var(--border);border-radius:10px;padding:12px 18px;display:flex;align-items:center;gap:14px;transition:all 0.15s;box-shadow:var(--sh);}
.office-row:hover{border-color:var(--cyan);box-shadow:var(--sh-md);}
.or-flag{font-size:1.4rem;flex-shrink:0;}
.or-main{flex:1;min-width:0;}
.or-name{font-size:0.88rem;font-weight:700;color:var(--ink);}
.or-city{font-size:0.72rem;color:var(--slate2);}
.or-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px;}
.or-contacts{flex:0 0 220px;font-size:0.72rem;color:var(--slate);line-height:1.4;}
.or-stats{display:flex;gap:14px;flex-shrink:0;}
.or-stat{text-align:center;}
.or-stat-n{font-size:0.85rem;font-weight:700;color:var(--ink);}
.or-stat-l{font-size:0.6rem;color:var(--slate2);text-transform:uppercase;letter-spacing:0.05em;}
.or-btns{display:flex;gap:5px;flex-shrink:0;}

/* ── EMPTY ── */
.empty{padding:60px;text-align:center;color:var(--slate2);}
.empty i{font-size:2rem;display:block;margin-bottom:10px;opacity:0.4;}

/* ── VIEW MODAL ── */
.view-modal-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;padding:20px;}
.view-modal-box{background:white;border-radius:16px;width:100%;max-width:480px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,0.3);}
.vm-head{padding:18px 20px;display:flex;align-items:center;gap:12px;}
.vm-flag{font-size:2.4rem;line-height:1;}
.vm-info{flex:1;}
.vm-country{font-size:1.1rem;font-weight:800;color:white;}
.vm-city{font-size:0.76rem;color:rgba(255,255,255,0.65);}
.vm-close{background:rgba(255,255,255,0.2);border:none;border-radius:8px;width:30px;height:30px;color:white;font-size:1.1rem;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;}
.vm-body{padding:16px 20px;display:flex;flex-direction:column;gap:9px;}
.vm-row{display:flex;gap:10px;align-items:flex-start;font-size:0.81rem;color:#334155;}
.vm-row i{color:#94a3b8;margin-top:2px;width:14px;flex-shrink:0;font-size:0.72rem;}
.vm-purpose{background:#f8fafc;border-left:3px solid var(--cyan);border-radius:0 6px 6px 0;padding:9px 12px;font-size:0.76rem;color:#475569;line-height:1.55;}
.vm-footer{display:flex;gap:8px;padding:14px 20px;border-top:1px solid var(--border);}

@media(max-width:768px){
  .hero{padding:24px 20px 20px;}
  .toolbar{padding:12px 16px;}
  .main{padding:20px 16px;}
  .or-contacts,.or-stats{display:none;}
}
</style>
</head>

  </div>

  <div style="display:flex;gap:3px;margin-left:10px;flex-shrink:0;">
    <button id="btnGrid" onclick="setView('grid',this)" class="view-btn view-btn-on" title="Grid"><i class="fas fa-th-large"></i></button>
    <button id="btnList" onclick="setView('list',this)" class="view-btn" title="List"><i class="fas fa-list"></i></button>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="mainArea"></div>

<div id="viewModalContainer"></div>

// Data version — bump this whenever OFFICES array is updated to force re-seed Firebase
const OFFICES_VERSION = '2025-03-09-v2';

async function loadOfficesFromDB(){
  if(!_db){ render(); return; }
  try{
    // Check if Firebase has the current version
    const verSnap = await _db.ref('tripfactory/wiki-offices-version').once('value');
    const storedVer = verSnap.val();
    if(storedVer !== OFFICES_VERSION){
      // New version — push hardcoded data to Firebase
      const seed={};OFFICES.forEach(o=>{seed[o.id]=o;});
      await _db.ref(FB_OFF).set(seed).catch(()=>{});
      await _db.ref('tripfactory/wiki-offices-version').set(OFFICES_VERSION).catch(()=>{});
      console.log('Offices re-seeded to version', OFFICES_VERSION);
    } else {
      // Version matches — load from Firebase
      const snap=await _db.ref(FB_OFF).once('value');
      const d=snap.val();
      if(d&&Object.keys(d).length>0){
        OFFICES.length=0;
        Object.values(d).forEach(o=>OFFICES.push(o));
      }
    }
  }catch(e){
    console.warn('loadOfficesFromDB:',e);
  }
}

// ── REGION CHIPS ─────────────────────────────────────────────
function buildRegionChips(){
  const regions = ['All', ...Object.keys(REGION_CONFIG)];
  document.getElementById('regionChips').innerHTML = regions.map(r =>
    `<div class="chip ${r==='All'?'on':''}" onclick="setRegion('${r}',this)">${r==='All'?'All Regions':r}</div>`
  ).join('');
}

// ── FILTERS ──────────────────────────────────────────────────
function setRegion(r, el){
  activeRegion = r;
  document.querySelectorAll('#regionChips .chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  render();
}
function toggleActive(el){
  activeOnly = !activeOnly;
  el.classList.toggle('on', activeOnly);
  render();
}
function applyFilters(){ render(); }
function setView(v, btn){
  viewMode = v;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('view-btn-on'));
  btn.classList.add('view-btn-on');
  render();
}
function filtered(){
  const q = (document.getElementById('searchInp')?.value||'').toLowerCase().trim();
  return OFFICES.filter(o => {
    if(activeOnly && o.status !== 'Active') return false;
    if(activeRegion !== 'All' && o.region !== activeRegion) return false;
    if(q){
      const hay = [o.country,o.city,o.region,o.contacts,o.address,o.purpose,o.market,o.email].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  const data = filtered();
  const shownActive = data.filter(o=>o.status==='Active').length;
  const shownStaff  = data.reduce((s,o)=>s+(parseInt(o.staff)||0),0);
  const et=document.getElementById('statTotal');   if(et) et.textContent=data.length;
  const ea=document.getElementById('statActive');  if(ea) ea.textContent=shownActive;
  const es=document.getElementById('statStaff');   if(es) es.textContent=shownStaff.toLocaleString();
  if(!data.length){
    document.getElementById('mainArea').innerHTML = `<div class="empty"><i class="fas fa-search"></i>No offices match your filters.</div>`;
    return;
  }
  if(viewMode === 'list'){ renderList(data); } else { renderGrid(data); }
}

function renderGrid(data){
  const groups = {};
  data.forEach(o => {
    if(!groups[o.region]) groups[o.region] = [];
    groups[o.region].push(o);
  });
  document.getElementById('mainArea').innerHTML = Object.entries(groups).map(([region, offices]) => {
    const cfg = REGION_CONFIG[region] || {icon:'fa-globe',color:'#475569'};
    return `
      <div class="region-section">
        <div class="region-header">
          <div class="region-icon" style="background:${cfg.color};"><i class="fas ${cfg.icon}"></i></div>
          <div class="region-name">${region}</div>
          <div class="region-line"></div>
          <div class="region-count">${offices.length} office${offices.length>1?'s':''}</div>
        </div>
        <div class="offices-grid">${offices.map(o => officeCard(o)).join('')}</div>
      </div>`;
  }).join('');
}

function renderList(data){
  document.getElementById('mainArea').innerHTML = `<div class="offices-list">${data.map(o => officeRow(o)).join('')}</div>`;
}

// ── BADGE HELPERS ─────────────────────────────────────────────
function statusBadgeClass(s){
  if(s==='Active') return 'badge-active';
  if(s==='Non-Operational') return 'badge-nonop';
  if(s==='Planning') return 'badge-planning';
  return 'badge-opportunity';
}
function statusBarClass(s){
  if(s==='Active') return 'bar-active';
  if(s==='Non-Operational') return 'bar-nonop';
  if(s==='Planning') return 'bar-planning';
  return 'bar-opportunity';
}
function capBadges(o){
  const caps = [];
  if(o.physical==='Yes')  caps.push(`<span class="cap-badge cap-physical">📍 Physical</span>`);
  if(o.inbound==='Yes')   caps.push(`<span class="cap-badge cap-in">↙ Inbound</span>`);
  if(o.outbound==='Yes')  caps.push(`<span class="cap-badge cap-out">↗ Outbound</span>`);
  if(o.transport==='Yes') caps.push(`<span class="cap-badge cap-transport">🚌 Transport</span>`);
  if(o.credits==='Yes')   caps.push(`<span class="cap-badge cap-credits">💳 Credits</span>`);
  return caps.join('');
}

      <div class="oc-top">
        <div class="oc-top-row">
          <div class="oc-flag">${o.flag||'🏢'}</div>

            <div class="oc-city">${o.city||o.region}</div>
            <div class="oc-badges">

      <div class="oc-divider"></div>
      <div class="oc-body">
        ${o.contacts ? `<div class="oc-row"><i class="fas fa-user-tie"></i><span style="font-size:0.73rem;">${o.contacts}</span></div>` : ''}
        ${o.address  ? `<div class="oc-row"><i class="fas fa-map-marker-alt"></i><span style="font-size:0.71rem;color:var(--slate2);">${o.address}</span></div>` : ''}
        ${staff > 0 || drivers > 0 ? `<div class="oc-row"><i class="fas fa-users"></i><span>${staff>0?staff+' staff':''}${staff>0&&drivers>0?' · ':''}${drivers>0?drivers+' drivers':''}</span></div>` : ''}
        ${o.physical ? `<div class="oc-row"><i class="fas fa-building"></i><span style="font-size:0.71rem;">${o.physical}</span></div>` : ''}
        ${o.purpose  ? `<div class="oc-purpose">${o.purpose}</div>` : ''}
        <div class="oc-capabilities">${capBadges(o)}</div>

        <button class="card-del-btn" onclick="deleteOffice('${o.id}')"><i class="fas fa-trash"></i></button>
      </div>
    </div>`;
}

// ── OFFICE ROW (list view) ────────────────────────────────────
function officeRow(o){
  const tc = TIER_CLASSES[o.tier] || 'badge-tier4';
  const tl = TIER_LABELS[o.tier]  || 'Tier '+o.tier;
  const isActive = o.status === 'Active';
  const staff = parseInt(o.staff)||0;
  return `
    <div class="office-row">
      <div class="or-flag">${o.flag||'🏢'}</div>
      <div class="or-main">
        <div class="or-name">${o.country}</div>
        <div class="or-city">${o.city||''}${o.region?' · '+o.region:''}</div>
        <div class="or-badges">
          <span class="badge ${statusBadgeClass(o.status)}">${o.status}</span>
          <span class="badge ${tc}">${tl}</span>
          ${o.type?`<span class="badge badge-type">${o.type}</span>`:''}
        </div>
      </div>
      <div class="or-contacts">${o.contacts||'<span style="color:var(--slate2);">Contact TBC</span>'}${o.address?'<div style="margin-top:2px;color:var(--slate2);font-size:0.68rem;"><i class="fas fa-map-marker-alt" style="margin-right:3px;"></i>'+o.address+'</div>':''}</div>
      <div class="or-stats">
        <div class="or-stat"><div class="or-stat-n">${staff||'—'}</div><div class="or-stat-l">Staff</div></div>
        <div class="or-stat"><div class="or-stat-n">${o.drivers||'—'}</div><div class="or-stat-l">Drivers</div></div>
      </div>
      <div class="or-btns">
        <button class="card-view-btn" style="padding:4px 8px;" onclick="viewOffice('${o.id}')"><i class="fas fa-eye"></i></button>
        <button class="card-edit-btn" style="padding:4px 8px;" onclick="openEditOffice('${o.id}')"><i class="fas fa-pen"></i></button>
        <button class="card-del-btn" style="padding:4px 8px;" onclick="deleteOffice('${o.id}')"><i class="fas fa-trash"></i></button>
      </div>
    </div>`;
}

// ── VIEW MODAL ────────────────────────────────────────────────
function viewOffice(id){
  const o=OFFICES.find(x=>x.id===id); if(!o) return;
  const staff=parseInt(o.staff)||0;
  const drivers=parseInt(o.drivers)||0;
  const tc=TIER_CLASSES[o.tier]||'badge-tier4';
  const tl=TIER_LABELS[o.tier]||'Tier '+o.tier;
  const headBg=STATUS_HEAD_BG[o.status]||STATUS_HEAD_BG['Non-Operational'];
  const capRow=(label,val,icon)=>val==='Yes'?`<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f1f5f9;"><i class="fas ${icon}" style="width:14px;color:var(--cyan);font-size:0.72rem;"></i><span style="font-size:0.75rem;color:#374151;">${label}</span><span style="margin-left:auto;font-size:0.65rem;font-weight:700;color:#059669;background:#d1fae5;border-radius:10px;padding:1px 7px;">✓</span></div>`:
    `<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f1f5f9;"><i class="fas ${icon}" style="width:14px;color:#cbd5e1;font-size:0.72rem;"></i><span style="font-size:0.75rem;color:#94a3b8;">${label}</span><span style="margin-left:auto;font-size:0.65rem;font-weight:700;color:#94a3b8;background:#f1f5f9;border-radius:10px;padding:1px 7px;">—</span></div>`;
  document.getElementById('viewModalContainer').innerHTML=`
    <div class="view-modal-overlay" onclick="if(event.target===this)closeViewModal()">
      <div class="view-modal-box" style="max-width:520px;">
        <div class="vm-head" style="background:${headBg}">
          <div class="vm-flag" style="font-size:2.4rem;">${o.flag||'🏢'}</div>
          <div class="vm-info" style="flex:1;">
            <div class="vm-country" style="font-size:1.15rem;">${o.country}</div>
            <div class="vm-city" style="opacity:0.75;">${o.city&&o.city!=='Multiple'?o.city+' · ':''}${o.region}</div>
            <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;">
              <span class="badge ${statusBadgeClass(o.status)}" style="font-size:0.62rem;">${o.status}</span>
              <span class="badge ${tc}" style="font-size:0.62rem;">${tl}</span>
              ${o.type?`<span class="badge badge-type" style="font-size:0.6rem;">${o.type}</span>`:''}
            </div>
          </div>
          <button class="vm-close" onclick="closeViewModal()">×</button>
        </div>
        <div class="vm-body" style="padding:18px 20px;display:flex;flex-direction:column;gap:12px;">

          ${o.contacts?`<div style="background:#f8fafc;border-radius:8px;padding:10px 14px;">
            <div style="font-size:0.63rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#94a3b8;margin-bottom:6px;">Key Contacts</div>
            <div style="font-size:0.82rem;font-weight:600;color:#1e293b;">${o.contacts}</div>
          </div>`:''}

          ${o.address?`<div style="background:#f8fafc;border-radius:8px;padding:10px 14px;">
            <div style="font-size:0.63rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#94a3b8;margin-bottom:4px;"><i class="fas fa-map-marker-alt" style="margin-right:4px;"></i>Address</div>
            <div style="font-size:0.78rem;color:#374151;line-height:1.5;">${o.address}</div>
          </div>`:''}

          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
            <div style="background:#f8fafc;border-radius:8px;padding:10px;text-align:center;">
              <div style="font-size:1.4rem;font-weight:800;color:var(--cyan);">${staff||'—'}</div>
              <div style="font-size:0.63rem;color:#64748b;font-weight:600;text-transform:uppercase;">Staff</div>
            </div>
            <div style="background:#f8fafc;border-radius:8px;padding:10px;text-align:center;">
              <div style="font-size:1.4rem;font-weight:800;color:#b45309;">${drivers||'—'}</div>
              <div style="font-size:0.63rem;color:#64748b;font-weight:600;text-transform:uppercase;">Drivers</div>
            </div>
            <div style="background:#f8fafc;border-radius:8px;padding:10px;text-align:center;">
              <div style="font-size:0.78rem;font-weight:700;color:#374151;">${o.physical||'—'}</div>
              <div style="font-size:0.63rem;color:#64748b;font-weight:600;text-transform:uppercase;">Location Type</div>
            </div>
          </div>

          ${o.purpose?`<div style="background:linear-gradient(135deg,rgba(8,145,178,0.06),rgba(8,145,178,0.02));border:1px solid rgba(8,145,178,0.15);border-radius:8px;padding:10px 14px;">
            <div style="font-size:0.63rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#0891b2;margin-bottom:4px;">Purpose</div>
            <div style="font-size:0.78rem;color:#374151;line-height:1.5;">${o.purpose}</div>
          </div>`:''}

          <div style="background:#f8fafc;border-radius:8px;padding:10px 14px;">
            <div style="font-size:0.63rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#94a3b8;margin-bottom:8px;">Capabilities</div>
            ${capRow('Inbound Business',o.inbound,'fa-plane-arrival')}
            ${capRow('Outbound Business',o.outbound,'fa-plane-departure')}
            ${capRow('Transport / Logistics',o.transport,'fa-bus')}
            ${capRow('Credits Market',o.credits,'fa-credit-card')}
          </div>

        </div>
        <div class="vm-footer">
          <button onclick="closeViewModal();openEditOffice('${o.id}')" style="flex:1;padding:8px;background:var(--cyan);border:none;border-radius:8px;color:white;font-size:0.78rem;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;"><i class="fas fa-pen"></i> Edit Office</button>
          <button onclick="closeViewModal()" style="padding:8px 16px;background:#f1f5f9;border:none;border-radius:8px;color:#475569;font-size:0.78rem;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;">Close</button>
        </div>
      </div>
    </div>`;
}
function closeViewModal(){
  document.getElementById('viewModalContainer').innerHTML='';
}

// ── EDIT / ADD MODAL ──────────────────────────────────────────
function openAddOffice(){
  document.getElementById('officeModal').style.display='flex';
  document.getElementById('omTitle').textContent='Add Office';
  document.getElementById('omForm').reset();
  document.getElementById('omId').value='';
}
function openEditOffice(id){
  const o=OFFICES.find(x=>x.id===id); if(!o) return;
  document.getElementById('officeModal').style.display='flex';
  document.getElementById('omTitle').textContent='Edit — '+o.country;
  document.getElementById('omId').value=id;
  document.getElementById('omCountry').value=o.country||'';
  document.getElementById('omCity').value=o.city||'';
  document.getElementById('omFlag').value=o.flag||'';
  document.getElementById('omRegion').value=o.region||'Europe';
  document.getElementById('omStatus').value=o.status||'Active';
  document.getElementById('omContacts').value=o.contacts||'';
  document.getElementById('omAddress').value=o.address||'';
  document.getElementById('omStaff').value=o.staff||'0';
  document.getElementById('omDrivers').value=o.drivers||'0';
  document.getElementById('omPurpose').value=o.purpose||'';
  document.getElementById('omMarket').value=o.market||'';
  document.getElementById('omInbound').checked=o.inbound==='Yes';
  document.getElementById('omOutbound').checked=o.outbound==='Yes';
  document.getElementById('omTransport').checked=o.transport==='Yes';
  document.getElementById('omCredits').checked=o.credits==='Yes';
  document.getElementById('omPhysical').value=o.physical||''
  document.getElementById('omType').value=o.type||'Trip Factory';
}
function closeOfficeModal(){
  document.getElementById('officeModal').style.display='none';
}
async function saveOffice(){
  const country=document.getElementById('omCountry').value.trim();
  if(!country){alert('Country is required');return;}
  const existingId=document.getElementById('omId').value;
  const id=existingId||'off_'+Date.now();
  const o={id,country,
    city:document.getElementById('omCity').value.trim(),
    flag:document.getElementById('omFlag').value.trim(),
    region:document.getElementById('omRegion').value,
    status:document.getElementById('omStatus').value,
    contacts:document.getElementById('omContacts').value.trim(),
    address:document.getElementById('omAddress').value.trim(),
    staff:document.getElementById('omStaff').value||'0',
    drivers:document.getElementById('omDrivers').value||'0',
    purpose:document.getElementById('omPurpose').value.trim(),
    market:document.getElementById('omMarket').value.trim(),
    inbound:document.getElementById('omInbound').checked?'Yes':'No',
    outbound:document.getElementById('omOutbound').checked?'Yes':'No',
    physical:document.getElementById('omPhysical').value.trim(),
    transport:document.getElementById('omTransport').checked?'Yes':'',
    credits:document.getElementById('omCredits').checked?'Yes':'',
    type:document.getElementById('omType').value||'Trip Factory',
    tier:2
  };
  const idx=OFFICES.findIndex(x=>x.id===id);
  if(idx>=0) OFFICES[idx]=o; else OFFICES.push(o);
  if(_db) await _db.ref(FB_OFF+id).set(o).catch(e=>console.error('Save:',e));
  closeOfficeModal();  // hide modal first
  render();            // then re-render grid
}

// ── DELETE ─────────────────────────────────────────────────────
async function deleteOffice(id){
  const o=OFFICES.find(x=>x.id===id);
  if(!confirm('Remove '+(o?.country||'this office')+'?')) return;
  const idx=OFFICES.findIndex(x=>x.id===id);
  if(idx>=0) OFFICES.splice(idx,1);
  if(_db) await _db.ref(FB_OFF+id).remove().catch(()=>{});
  render();
}
</script>
